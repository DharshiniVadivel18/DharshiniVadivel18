<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- window frame -->
  <rect x="2" y="2" width="636" height="356" rx="14" fill="url(#winGrad)" stroke="#10B981" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="2" y="2" width="636" height="40" rx="14" fill="#161b22"/>
  <rect x="2" y="28" width="636" height="14" fill="#161b22"/>
  <circle cx="26" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="6" fill="#27c93f"/>
  <text x="320" y="27" font-size="12.5" fill="#8b949e" text-anchor="middle">dharshini@devbox: ~</text>
  <mask id="mcmd0">
    <rect x="0" y="0" width="640" height="360" fill="black"/>
    <rect x="24" y="62" height="22" fill="white">
      <animate attributeName="width" values="0;0;72.0;72.0" keyTimes="0;0.0001;0.0571;1" dur="14.0s" repeatCount="indefinite"/>
    </rect>
  </mask>
  <g mask="url(#mcmd0)">
